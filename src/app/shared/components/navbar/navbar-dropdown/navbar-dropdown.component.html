<div class="relative" #dropdownRef>

  <!-- Trigger button -->
  <button
    (click)="toggleDropdown()"
    class="flex items-center gap-2 h-9 px-2.5 rounded-xl transition-all duration-150 focus:outline-none"
    style="background: var(--bg-surface); border: 1.5px solid var(--border-subtle);"
  >
    <div class="w-6 h-6 rounded-lg flex items-center justify-center text-[11px] font-bold tracking-tight"
      style="background: #3b82f6; color: #fff;">
      {{ initials() }}
    </div>
    <svg class="w-3.5 h-3.5 transition-transform duration-200"
      [style.transform]="isOpen() ? 'rotate(180deg)' : 'rotate(0deg)'"
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
      style="color: var(--text-tertiary)">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <!-- Dropdown -->
  @if (isOpen()) {
    <div
      class="absolute right-0 mt-2 w-56 rounded-xl overflow-visible z-50"
      style="background: var(--bg-base); border: 1.5px solid var(--border-subtle); top: 100%;">

      <!-- User info header -->
      <div class="px-4 py-3" style="border-bottom: 1px solid var(--border-subtle);">
        <p class="text-sm font-semibold" style="color: var(--text-primary)">{{ fullName() }}</p>
        <p class="text-xs mt-0.5" style="color: var(--text-tertiary)">{{ email() }}</p>
      </div>

      <!-- Menu items -->
      <div class="py-1.5">

        <a routerLink="/profile"
          (click)="close()"
          class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-100 cursor-pointer"
          style="color: var(--text-secondary); background: transparent;"
          onmouseenter="this.style.background='var(--bg-surface)'; this.style.color='var(--text-primary)'"
          onmouseleave="this.style.background='transparent'; this.style.color='var(--text-secondary)'">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Profile
        </a>

        <a routerLink="/settings"
          (click)="close()"
          class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-100 cursor-pointer"
          style="color: var(--text-secondary); background: transparent;"
          onmouseenter="this.style.background='var(--bg-surface)'; this.style.color='var(--text-primary)'"
          onmouseleave="this.style.background='transparent'; this.style.color='var(--text-secondary)'">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </a>

        <a routerLink="/history"
          (click)="close()"
          class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-100 cursor-pointer"
          style="color: var(--text-secondary); background: transparent;"
          onmouseenter="this.style.background='var(--bg-surface)'; this.style.color='var(--text-primary)'"
          onmouseleave="this.style.background='transparent'; this.style.color='var(--text-secondary)'">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Previous history
        </a>

        <!-- Appearance with hover submenu -->
        <div class="relative"
          (mouseenter)="showAppearanceMenu()"
          (mouseleave)="hideAppearanceMenu()">

          <div
            class="flex items-center justify-between gap-3 px-4 py-2.5 text-sm cursor-pointer transition-colors duration-100"
            [style.background]="showAppearance() ? 'var(--bg-surface)' : 'transparent'"
            [style.color]="showAppearance() ? 'var(--text-primary)' : 'var(--text-secondary)'">
            <div class="flex items-center gap-3">
              <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                @if (isDark()) {
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                } @else {
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                }
              </svg>
              Appearance
            </div>
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
              style="color: var(--text-tertiary)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </div>

          <!-- Submenu -->
          @if (showAppearance()) {
            <div
              class="absolute rounded-xl overflow-hidden z-50"
              style="
                right: calc(100% + 6px);
                top: 0;
                width: 140px;
                background: var(--bg-base);
                border: 1.5px solid var(--border-subtle);
              ">

              <button
                (click)="setTheme('light')"
                class="w-full flex items-center justify-between px-4 py-2.5 text-sm transition-colors duration-100"
                style="border: none; cursor: pointer; background: transparent;"
                [style.color]="!isDark() ? 'var(--text-primary)' : 'var(--text-secondary)'"
                onmouseenter="this.style.background='var(--bg-surface)'"
                onmouseleave="this.style.background='transparent'">
                <div class="flex items-center gap-2.5">
                  <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                  </svg>
                  Light
                </div>
                @if (!isDark()) {
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
                    style="color: var(--accent-cyan)">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                }
              </button>

              <button
                (click)="setTheme('dark')"
                class="w-full flex items-center justify-between px-4 py-2.5 text-sm transition-colors duration-100"
                style="border: none; cursor: pointer; background: transparent;"
                [style.color]="isDark() ? 'var(--text-primary)' : 'var(--text-secondary)'"
                onmouseenter="this.style.background='var(--bg-surface)'"
                onmouseleave="this.style.background='transparent'">
                <div class="flex items-center gap-2.5">
                  <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                  </svg>
                  Dark
                </div>
                @if (isDark()) {
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
                    style="color: var(--accent-cyan)">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                }
              </button>

            </div>
          }
        </div>

      </div>

      <!-- Divider -->
      <div style="border-top: 1px solid var(--border-subtle);"></div>

      <!-- Logout -->
      <div class="py-1.5">
        <button
          (click)="logout()"
          class="w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-100"
          style="color: #ef4444; background: transparent; border: none; cursor: pointer;"
          onmouseenter="this.style.background='rgba(239,68,68,0.07)'"
          onmouseleave="this.style.background='transparent'">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Log out
        </button>
      </div>

    </div>
  }

</div>
