<!-- Skill_Drill — Navbar (Premium Overhaul) -->
<header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md"
        style="border-bottom: 1px solid var(--border-subtle);
               background: color-mix(in srgb, var(--bg-base) 82%, transparent);">
  <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Logotype -->
    <a routerLink="/" class="flex items-center gap-2.5 select-none group">
      <span class="w-7 h-7 rounded-lg flex items-center justify-center transition-transform duration-200 group-hover:scale-95"
            style="background: var(--text-primary);">
        <span class="text-[11px] font-black tracking-tighter" style="color: var(--bg-base);">SD</span>
      </span>
      <span class="text-[15px] font-semibold tracking-tight" style="color: var(--text-primary);">
        Skill_Drill
      </span>
    </a>

    <!-- Nav Links -->
    <ul class="hidden md:flex items-center gap-1">
      @for (link of navLinks; track link.label) {
        <li>
          <a [href]="link.href"
             class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-150"
             style="color: var(--text-secondary);"
             onmouseenter="this.style.color='var(--text-primary)'; this.style.background='var(--bg-surface-alt)';"
             onmouseleave="this.style.color='var(--text-secondary)'; this.style.background='transparent';">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Right Actions -->
    <div class="flex items-center gap-2.5">
      <!-- Theme Toggle -->
      <button (click)="toggleTheme()"
              class="w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-150"
              style="color: var(--text-secondary); border: 1px solid var(--border-subtle);"
              onmouseenter="this.style.color='var(--text-primary)'; this.style.background='var(--bg-surface-alt)';"
              onmouseleave="this.style.color='var(--text-secondary)'; this.style.background='transparent';"
              [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (isDark()) {
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        } @else {
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        }
      </button>

      <!-- Auth CTA -->
      @if (isAuth$ | async) {
        <div class="flex items-center gap-2">
          <a routerLink="/dashboard"
             class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors duration-150"
             style="background: var(--text-primary); color: var(--bg-base);">
            Dashboard
          </a>
          <app-navbar-dropdown />
        </div>
      } @else {
        <a routerLink="/auth/login"
           class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors duration-150"
           style="background: var(--text-primary); color: var(--bg-base);">
          Log in
        </a>
      }
    </div>
  </nav>
</header>
<div class="h-16"></div>
