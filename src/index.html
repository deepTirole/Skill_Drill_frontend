<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Skill_Drill — AI Mock Interview Engine</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AI-powered adaptive mock interviews. Sharpen your technical edge with real-time Elo ranking and deep critique feedback." />
    <meta name="theme-color" content="#0B0F19" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="assets/logo.png" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sd_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="background:var(--bg-base)" class="antialiased">
    <app-root></app-root>
  </body>
</html>
